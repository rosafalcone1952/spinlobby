<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSpin Pro - Dashboard</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Winwheel/2.7.0/Winwheel.min.js"></script>
    <style>
        :root { 
            --bg-deep: #0a0a12; 
            --bg-panel: #14141f; 
            --primary: #8a2be2; 
            --accent: #00e5ff; 
            --text-main: #f0f0f5; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 2rem; 
        }S
        .dashboard { 
            width: 100%; 
            max-width: 400px; 
            background-color: var(--bg-panel); 
            padding: 2rem; 
            border-radius: 24px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #names-list { 
            list-style: none; 
            margin: 1.5rem 0; 
            max-height: 300px; 
            overflow-y: auto; 
            text-align: left; 
        }
        #names-list li { 
            background: rgba(255,255,255,0.05); 
            padding: 0.8rem; 
            margin-bottom: 0.5rem; 
            border-radius: 8px; 
        }
        .btn-spin { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1rem; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-bottom: 0.8rem; 
        }
        .btn-clear { 
            background: rgba(255, 74, 90, 0.1); 
            color: #ff4a5a; 
            border: 1px solid rgba(255, 74, 90, 0.2); 
            padding: 0.8rem; 
            width: 100%; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
        }
        /* ... your code is here ... */
    padding: 2rem;
}  <-- THIS IS THE CLOSING STYLE TAG
        #canvas {
    display: block;
    margin: 20px auto;
    max-width: 100%;
}
  </style>
</head>
<body>

    <div class="dashboard">
        <h2>Live Entries (<span id="count">0</span>)</h2>
        <canvas id="canvas" width="400" height="400">Canvas not supported.</canvas>
        <ul id="names-list"></ul>
        <button class="btn-spin" id="spin-btn" onclick="spinWheel()">SPIN FOR WINNER</button>
        <button class="btn-clear" onclick="clearEntries()">CLEAR ALL ENTRIES</button>
    </div>

    <script>
const SUPABASE_URL = "https://rsfxyynwmcvykzytuhlc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_0a5CYc6SUvoyYJAacVWeg_QSYLJ__h";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let theWheel;

    async function updateWheel() {
        const { data } = await supabaseClient.from('entries').select('username');
        document.getElementById('count').textContent = data ? data.length : 0;

        if (data && data.length > 0) {
            const segments = data.map(d => ({ 'text': d.username, 'fillStyle': '#8a2be2' }));
            
            theWheel = new Winwheel({
                'numSegments': segments.length,
                'segments': segments,
                'animation': {
                    'type': 'spinToStop',
                    'duration': 5,
                    'spins': 8
                }
            });
            theWheel.draw();
        }
    }

    function spinWheel() {
        if (theWheel) {
            theWheel.startAnimation();
        } else {
            alert("No entries to spin!");
        }
    }

    async function clearEntries() {
        if (!confirm("Are you sure you want to delete ALL entries?")) return;
        await supabaseClient.from('entries').delete().neq('username', 'nonexistent');
        location.reload();
    }

    // Initialize
    updateWheel();
    </script>
</body>
</html>
