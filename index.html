<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSpin Pro - Professional Live Giveaway Wheel</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-panel: #14141f;
            --primary: #8a2be2; /* Deep violet */
            --primary-glow: rgba(138, 43, 226, 0.4);
            --secondary: #4b0082; /* Indigo */
            --accent: #00e5ff; /* Cyan accent */
            --text-main: #f0f0f5;
            --text-muted: #8a8f98;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* --- Header & Header Animation --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-main);
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- Main Application Layout --- */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 3rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; /* Responsive wrap */
        }

        /* --- 1. WHEEL SECTION --- */
        .wheel-section {
            position: relative;
            flex: 0 0 500px;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Responsive Wheel Resizing */
        @media (max-width: 1100px) {
            .app-container { gap: 1rem; flex-direction: column; }
            .wheel-section { flex: 0 0 400px; width: 400px; height: 400px; }
            canvas { width: 400px; height: 400px; }
        }
        @media (max-width: 500px) {
            .wheel-section { flex: 0 0 300px; width: 300px; height: 300px; }
            canvas { width: 300px; height: 300px; }
        }

        canvas {
            border-radius: 50%;
            /* Minimalist outer glow for depth */
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 15px var(--primary-glow);
            transition: transform 6s cubic-bezier(0.1, 0.9, 0.1, 1); /* Smooth 6s spin */
        }

        /* Stylized Elegant Pointer */
        .wheel-pointer {
            position: absolute;
            top: -10px; /* Slight offset for center alignment */
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 60px;
            background-color: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0); /* Elegant triangle */
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            border-bottom: 4px solid var(--accent); /* Minimal accent */
        }

        /* --- 2. DASHBOARD SECTION --- */
        .dashboard-section {
            flex: 1 1 400px; /* Responsive flex */
            max-width: 500px;
            background-color: var(--bg-panel);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.03); /* Subtle border */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Spin Button - Refined and Professional */
        #spin-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 1.25rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s var(--ease);
            letter-spacing: -0.5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #spin-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s var(--ease);
        }

        #spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.5);
        }

        #spin-btn:hover:not(:disabled)::after {
            left: 100%;
        }

        #spin-btn:disabled {
            background: #252533;
            color: #5a5a6e;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* List Header */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.75rem;
        }

        .list-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .entry-count {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            background: rgba(0, 229, 255, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 8px;
        }

        /* Name List - Smooth Entrance */
        #names-list {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding-right: 0.5rem;
        }

        #names-list li {
            background-color: rgba(255,255,255,0.02);
            padding: 1rem;
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s var(--ease);
            animation: slideIn 0.4s var(--ease) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        #names-list li:hover {
            background-color: rgba(255,255,255,0.04);
            transform: translateX(3px);
        }

        .timestamp {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Scrollbar Styling */
        #names-list::-webkit-scrollbar { width: 6px; }
        #names-list::-webkit-scrollbar-track { background: transparent; }
        #names-list::-webkit-scrollbar-thumb { background: #252533; border-radius: 3px; }

        /* --- Winner Modal - Premium Overlay --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); /* Modern blur */
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s var(--ease);
        }

        .modal.open {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: var(--bg-panel);
            padding: 3rem;
            border-radius: 24px;
            border: 2px solid var(--accent);
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.3);
            transform: scale(0.8);
            transition: transform 0.5s var(--ease);
            width: 90%;
            max-width: 500px;
        }

        .modal.open .modal-content {
            transform: scale(1);
        }

        .modal-content h2 {
            color: var(--accent);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .modal-content p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        #winner-name {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: white;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            line-height: 1;
        }

        .close-btn {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        
    </style>
</head>
<body>

    <header>
        <h1>StreamSpin<span style="color:var(--accent)">.</span></h1>
        <p class="subtitle">Live giveaway wheel. Users join instantly.</p>
    </header>

    <main class="app-container">
        <!-- 1. WHEEL SECTION -->
        <section class="wheel-section">
            <div class="wheel-pointer"></div>
            <!-- Canvas resolution multiplied by 2 for Retina/High-DPI sharp rendering -->
            <canvas id="wheel" width="1000" height="1000" style="width: 500px; height: 500px;"></canvas>
        </section>

        <!-- 2. DASHBOARD SECTION -->
        <section class="dashboard-section">
            <div class="list-header">
                <h2>Live Entries</h2>
                <span class="entry-count" id="count">0</span>
            </div>
            
            <ul id="names-list">
                <!-- Names dynamically populated here -->
            </ul>
            
            <button id="spin-btn" onclick="spinWheel()" disabled>SPIN FOR WINNER</button>
        </section>
    </main>

    <!-- WINNER ANNOUNCEMENT MODAL -->
    <div id="winner-modal" class="modal">
        <div class="modal-content">
            <h2>🎉 CONGRATULATIONS!</h2>
            <p>The system has selected a winner:</p>
            <div id="winner-name">---</div>
            <button class="close-btn" onclick="closeModal()">Back to Setup</button>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE CONFIGURATION (PROFESSIONAL CONNECTION) ---
        const SUPABASE_URL = "https://rsfxynywmcvkyzutuhlc.supabase.co";
        
        // !!! PASTE YOUR ANON PUBLIC KEY INSIDE THE QUOTES BELOW !!!
        const SUPABASE_ANON_KEY = "sb_publishable_0a5CYc6SUVoyYJAAcWVwEg_QSYLJ__h"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- State & Setup ---
        let participants = [];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        
        // Retina/High-DPI scaling
        ctx.scale(2, 2); 
        
        // Deep Purple Smooth Color Palette for Wheel Segments
        const palette = ["#8a2be2", "#4b0082", "#7b1fa2", "#6a1b9a", "#9c27b0", "#512da8"];
        
        let currentRotation = 0;
        let isSpinning = false;
        const spinButton = document.getElementById("spin-btn");

        // --- Professional Wheel Drawing (Sharp & Clean) ---
        function drawWheel() {
            const segments = participants.length;
            ctx.clearRect(0, 0, 500, 500); // Clear the scaled down logical area

            if (segments === 0) {
                // Empty State: Sleek placeholder
                ctx.beginPath();
                ctx.arc(250, 250, 240, 0, 2 * Math.PI);
                ctx.fillStyle = "#14141f";
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#252533";
                ctx.stroke();

                ctx.fillStyle = "#5a5a6e";
                ctx.font = "600 18px Inter";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("Waiting for entries...", 250, 250);
                return;
            }

            const anglePerSeg = (2 * Math.PI) / segments;

            for (let i = 0; i < segments; i++) {
                const startAngle = i * anglePerSeg;
                const endAngle = startAngle + anglePerSeg;

                // Draw Segment Slice
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 245, startAngle, endAngle);
                ctx.fillStyle = palette[i % palette.length];
                ctx.fill();
                
                // Minimalist separator lines
                ctx.lineWidth = 1;
                ctx.strokeStyle = "rgba(10, 10, 18, 0.5)";
                ctx.stroke();

                // --- Professional Name Typography ---
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(startAngle + anglePerSeg / 2);
                
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff";
                ctx.font = "700 16px Inter"; // Clean, bold font
                
                // Subtle shadow for readability against any segment color
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;

                const name = participants[i];
                // Clean truncation if too long
                const displayName = name.length > 15 ? name.substring(0, 13) + '..' : name;
                
                // Professional padding from edge
                ctx.fillText(displayName, 230, 0); 
                ctx.restore();
            }

            // --- Elegant Center Pin ---
            // Outer Ring
            ctx.beginPath();
            ctx.arc(250, 250, 35, 0, 2 * Math.PI);
            ctx.fillStyle = "#0a0a12";
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#ffffff";
            ctx.stroke();
            
            // Inner Fill
            ctx.beginPath();
            ctx.arc(250, 250, 30, 0, 2 * Math.PI);
            ctx.fillStyle = palette[1]; // Use Indigo
            ctx.fill();
        }

        // --- Logic: High-Performance Spin ---
        function spinWheel() {
            if (isSpinning || participants.length === 0) return;
            isSpinning = true;
            spinButton.disabled = true;
            spinButton.textContent = "SPINNING...";

            // Determine winner randomly
            const winnerIndex = Math.floor(Math.random() * participants.length);
            const segments = participants.length;
            const anglePerSeg = 360 / segments;
            
            // Calculate precise rotation required to end pointing at 270 degrees (Top)
            // We factor in the width of the segment to land in the center.
            const targetRotation = 270 - (winnerIndex * anglePerSeg) - (anglePerSeg / 2);
            
            // 8 Full Spins (2880 deg) + target angle for excitement
            const finalRotation = 2880 + targetRotation;

            // Apply smooth CSS transformation
            canvas.style.transform = `rotate(${finalRotation}deg)`;

            // Wait 6 seconds for the animation to finish
            setTimeout(() => {
                announceWinner(participants[winnerIndex]);
                resetWheelAnimation(finalRotation);
            }, 6000);
        }

        function announceWinner(winner) {
            const modal = document.getElementById("winner-modal");
            document.getElementById("winner-name").textContent = winner;
            modal.classList.add("open");
        }

        function resetWheelAnimation(finalRotation) {
            // Immediately stop CSS transition
            canvas.style.transition = "none";
            // Normalize the angle (keep it between 0-359)
            const normalizedAngle = finalRotation % 360;
            // Set the wheel position to that angle without any animation
            canvas.style.transform = `rotate(${normalizedAngle}deg)`;
            
            isSpinning = false;
            spinButton.disabled = false;
            spinButton.textContent = "SPIN FOR WINNER";
            
            // Allow CSS transition again for the next spin (after a tiny delay)
            setTimeout(() => {
                canvas.style.transition = "transform 6s cubic-bezier(0.1, 0.9, 0.1, 1)";
            }, 50);
        }

        function closeModal() {
            document.getElementById("winner-modal").classList.remove("open");
        }

        // --- UI Update: Professional Realtime Integration ---
        function addNameToList(name) {
            const list = document.getElementById('names-list');
            const li = document.createElement('li');
            
            // Add user name and subtle timestamp
            li.innerHTML = `
                <span class="name">${name}</span>
                <span class="timestamp">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            `;
            
            // Modern feel: Newest entry always at top
            list.prepend(li);
        }

        function updateUI() {
            document.getElementById("count").textContent = participants.length;
            spinButton.disabled = (participants.length === 0 || isSpinning);
            drawWheel();
        }

        // --- Supabase Realtime Logic ---
        async function loadExistingNames() {
            const { data, error } = await supabaseClient.from('entries').select('username').order('created_at', { ascending: false });
            if (data) {
                // Populate internal state
                participants = data.map(entry => entry.username).reverse(); // Reverse for consistent spin order
                
                // Populate List UI
                const list = document.getElementById('names-list');
                list.innerHTML = "";
                // Add in descending order so newest is on top
                data.forEach(entry => addNameToList(entry.username));
                
                updateUI();
            } else if (error) {
                console.error("Setup Error: API Key might be invalid.", error.message);
                spinButton.textContent = "CONNECTION ERROR";
            }
        }

        // Professional Realtime Subscription
        supabaseClient
            .channel('public:entries')
            .on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'entries' }, 
                payload => {
                    const newName = payload.new.username;
                    // Update state
                    participants.push(newName);
                    // Add smooth UI update
                    addNameToList(newName);
                    updateUI();
                }
            )
            .subscribe();

        // Start connection
        loadExistingNames();

    </script>
</body>
</html>
