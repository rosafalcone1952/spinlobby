<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSpin Pro - Dashboard</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-deep: #0a0a12; 
            --bg-panel: #14141f; 
            --primary: #8a2be2; 
            --accent: #00e5ff; 
            --text-main: #f0f0f5; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 2rem; 
        }
        .dashboard { 
            width: 100%; 
            max-width: 400px; 
            background-color: var(--bg-panel); 
            padding: 2rem; 
            border-radius: 24px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #names-list { 
            list-style: none; 
            margin: 1.5rem 0; 
            max-height: 300px; 
            overflow-y: auto; 
            text-align: left; 
        }
        #names-list li { 
            background: rgba(255,255,255,0.05); 
            padding: 0.8rem; 
            margin-bottom: 0.5rem; 
            border-radius: 8px; 
        }
        .btn-spin { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1rem; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-bottom: 0.8rem; 
        }
        .btn-clear { 
            background: rgba(255, 74, 90, 0.1); 
            color: #ff4a5a; 
            border: 1px solid rgba(255, 74, 90, 0.2); 
            padding: 0.8rem; 
            width: 100%; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Live Entries (<span id="count">0</span>)</h2>
        <ul id="names-list"></ul>
        <button class="btn-spin" id="spin-btn" onclick="spinWheel()">SPIN FOR WINNER</button>
        <button class="btn-clear" onclick="clearEntries()">CLEAR ALL ENTRIES</button>
    </div>

    <script>
        const SUPABASE_URL = "https://rsfxynywmcvkyzutuhlc.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_0a5CYc6SUVoyYJAAcWVwEg_QSYLJ__h"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- CLEAR DATABASE FUNCTION ---
        async function clearEntries() {
            if (!confirm("Are you sure you want to delete ALL entries from the database?")) return;
            
            const { error } = await supabaseClient
                .from('entries')
                .delete()
                .neq('username', 'nonexistent'); // Deletes all rows

            if (error) {
                alert("Error clearing entries: " + error.message);
            } else {
                // List will update automatically via real-time listener
            }
        }

        // --- LOAD NAMES ---
        async function loadNames() {
            const { data } = await supabaseClient.from('entries').select('username');
            if (data) {
                const list = document.getElementById('names-list');
                document.getElementById('count').textContent = data.length;
                list.innerHTML = data.map(d => `<li>${d.username}</li>`).join('');
            }
        }

        // --- REAL-TIME LISTENER ---
        supabaseClient.channel('entries')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'entries' }, () => {
                loadNames();
            })
            .subscribe();

        // Initial Load
        loadNames();

        function spinWheel() { 
            alert("Spinning the wheel! (Add your wheel animation logic here)"); 
        }
    </script>
</body>
</html>
